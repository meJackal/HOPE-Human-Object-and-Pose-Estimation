<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>H.O.P.E Detection System</title>
    <style>
    </style>
  </head>
  <body>
    <div id="left-panel">
      <div id="canvas-container">
        <canvas id="cv"></canvas>
        <div id="fps-display">FPS: --</div>
        <div id="error-display"></div>
      </div>
    </div>
    
    <div id="right-panel">
      <div class="panel-section">
        <h2>System Status</h2>
        <div class="status-indicator">
          <div class="status-dot" id="conn-status"></div>
          <span id="conn-text">Disconnected</span>
        </div>
        <div class="status-indicator">
          <div class="status-dot" id="run-status"></div>
          <span id="run-text">Stopped</span>
        </div>
      </div>
      
      <div class="panel-section">
        <h2>Controls</h2>
        <button class="start" id="start-btn" onclick="startDetection()"><span>Start Detection</span></button>
        <button class="stop" id="stop-btn" onclick="stopDetection()" style="margin-top:10px" disabled><span>Stop Detection</span></button>
      </div>
      
      <div class="panel-section">
        <h2>Detection Stats</h2>
        <div class="metric">
          <span class="metric-label">Detected Humans</span>
          <span class="metric-value" id="human-count">0</span>
        </div>
        <div class="metric">
          <span class="metric-label">Frame Rate</span>
          <span class="metric-value" id="fps-value">0</span>
        </div>
      </div>
      
      <div class="panel-section">
        <h2>Detected Persons</h2>
        <div id="persons-list" style="max-height: 300px; overflow-y: auto;">
          <div class="empty-state">No detections</div>
        </div>
      </div>
      
      <div class="panel-section">
        <h2>Detection Logs</h2>
        <div id="logs-list" style="max-height: 200px; overflow-y: auto; font-size: 12px;">
          <div class="empty-state">No logs yet</div>
        </div>
      </div>
    </div>

    <script src="detection.js" defer></script>
  </body>
</html>
