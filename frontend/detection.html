<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>H.O.P.E Detection System</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Arial, sans-serif;
        height: 100vh;
        display: flex;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #fff;
        overflow: hidden;
      }
      
      #left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, #000000 0%, #0f0f1e 100%);
        position: relative;
        border-right: 1px solid rgba(0, 212, 255, 0.1);
      }
      
      #canvas-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 20px;
      }
      
      canvas {
        max-width: 95%;
        max-height: 95%;
        display: block;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
        border: 1px solid rgba(0, 212, 255, 0.2);
      }
      
      #right-panel {
        width: 360px;
        background: linear-gradient(180deg, #16213e 0%, #0f1419 100%);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow-y: auto;
        box-shadow: -4px 0 24px rgba(0, 0, 0, 0.5);
      }
      
      #right-panel::-webkit-scrollbar {
        width: 8px;
      }
      
      #right-panel::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 4px;
      }
      
      #right-panel::-webkit-scrollbar-thumb {
        background: rgba(0, 212, 255, 0.3);
        border-radius: 4px;
      }
      
      #right-panel::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 212, 255, 0.5);
      }
      
      .panel-section {
        background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 18px;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
      }
      
      .panel-section:hover {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: 0 4px 16px rgba(0, 212, 255, 0.1);
      }
      
      h2 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 14px;
        color: #00d4ff;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      h2::before {
        content: '';
        width: 3px;
        height: 16px;
        background: linear-gradient(180deg, #00d4ff 0%, #00ff88 100%);
        border-radius: 2px;
      }
      
      .status-indicator {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        transition: all 0.3s ease;
      }
      
      .status-indicator:last-child {
        margin-bottom: 0;
      }
      
      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #444;
        position: relative;
        transition: all 0.3s ease;
      }
      
      .status-dot::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      .status-dot.connected { 
        background: #00ff88;
        box-shadow: 0 0 12px rgba(0, 255, 136, 0.6);
      }
      
      .status-dot.connected::after {
        background: radial-gradient(circle, rgba(0, 255, 136, 0.4) 0%, transparent 70%);
        opacity: 1;
        animation: pulse 2s infinite;
      }
      
      .status-dot.running { 
        background: #00d4ff;
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
      }
      
      .status-dot.running::after {
        background: radial-gradient(circle, rgba(0, 212, 255, 0.4) 0%, transparent 70%);
        opacity: 1;
        animation: pulse 2s infinite;
      }
      
      .status-dot.stopped { 
        background: #ff4444;
        box-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
      }
      
      @keyframes pulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
      }
      
      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
      }
      
      button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
      
      button:hover::before {
        width: 300px;
        height: 300px;
      }
      
      button span {
        position: relative;
        z-index: 1;
      }
      
      button.start {
        background: linear-gradient(135deg, #00ff88 0%, #00cc6e 100%);
        color: #000;
        box-shadow: 0 4px 16px rgba(0, 255, 136, 0.3);
      }
      
      button.start:hover { 
        box-shadow: 0 6px 24px rgba(0, 255, 136, 0.5);
        transform: translateY(-2px);
      }
      
      button.start:active {
        transform: translateY(0);
      }
      
      button.stop {
        background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
        color: #fff;
        box-shadow: 0 4px 16px rgba(255, 68, 68, 0.3);
      }
      
      button.stop:hover { 
        box-shadow: 0 6px 24px rgba(255, 68, 68, 0.5);
        transform: translateY(-2px);
      }
      
      button.stop:active {
        transform: translateY(0);
      }
      
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
      }
      
      button:disabled:hover {
        box-shadow: none;
      }
      
      .metric {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .metric:last-child { border-bottom: none; }
      
      .metric-label {
        color: #aaa;
        font-size: 13px;
        font-weight: 500;
      }
      
      .metric-value {
        font-size: 28px;
        font-weight: 900;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      #fps-display {
        position: absolute;
        top: 30px;
        left: 30px;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(10px);
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-family: 'Courier New', monospace;
        font-weight: 700;
        border: 1px solid rgba(0, 212, 255, 0.3);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        color: #00d4ff;
      }
      
      #error-display {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, rgba(255, 68, 68, 0.95) 0%, rgba(200, 0, 0, 0.95) 100%);
        backdrop-filter: blur(10px);
        padding: 24px 32px;
        border-radius: 12px;
        max-width: 80%;
        text-align: center;
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(255, 68, 68, 0.5);
        font-weight: 600;
      }
      
      #error-display.show {
        display: block;
        animation: slideDown 0.3s ease;
      }
      
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translate(-50%, -60%);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%);
        }
      }
      
      .person-item {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.3s ease;
      }
      
      .person-item:hover {
        background: rgba(0, 212, 255, 0.1);
        border-color: rgba(0, 212, 255, 0.4);
        transform: translateX(4px);
      }
      
      .person-item:last-child {
        margin-bottom: 0;
      }
      
      .person-item .person-id {
        font-weight: 600;
        color: #00d4ff;
        font-size: 14px;
      }
      
      .person-item .person-conf {
        color: #00ff88;
        font-weight: 800;
        font-size: 16px;
      }
      
      .log-item {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 8px;
        border-left: 3px solid #00d4ff;
        transition: all 0.3s ease;
      }
      
      .log-item:hover {
        background: rgba(0, 212, 255, 0.05);
        transform: translateX(4px);
      }
      
      .log-item:last-child {
        margin-bottom: 0;
      }
      
      .log-time {
        color: #00d4ff;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.5px;
      }
      
      .log-detail {
        color: #aaa;
        font-size: 11px;
        margin-top: 4px;
        font-weight: 500;
      }
      
      .empty-state {
        color: #666;
        font-size: 13px;
        text-align: center;
        padding: 20px;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="left-panel">
      <div id="canvas-container">
        <canvas id="cv"></canvas>
        <div id="fps-display">FPS: --</div>
        <div id="error-display"></div>
      </div>
    </div>
    
    <div id="right-panel">
      <div class="panel-section">
        <h2>System Status</h2>
        <div class="status-indicator">
          <div class="status-dot" id="conn-status"></div>
          <span id="conn-text">Disconnected</span>
        </div>
        <div class="status-indicator">
          <div class="status-dot" id="run-status"></div>
          <span id="run-text">Stopped</span>
        </div>
      </div>
      
      <div class="panel-section">
        <h2>Controls</h2>
        <button class="start" id="start-btn" onclick="startDetection()"><span>Start Detection</span></button>
        <button class="stop" id="stop-btn" onclick="stopDetection()" style="margin-top:10px" disabled><span>Stop Detection</span></button>
      </div>
      
      <div class="panel-section">
        <h2>Detection Stats</h2>
        <div class="metric">
          <span class="metric-label">Detected Humans</span>
          <span class="metric-value" id="human-count">0</span>
        </div>
        <div class="metric">
          <span class="metric-label">Frame Rate</span>
          <span class="metric-value" id="fps-value">0</span>
        </div>
      </div>
      
      <div class="panel-section">
        <h2>Detected Persons</h2>
        <div id="persons-list" style="max-height: 300px; overflow-y: auto;">
          <div class="empty-state">No detections</div>
        </div>
      </div>
      
      <div class="panel-section">
        <h2>Detection Logs</h2>
        <div id="logs-list" style="max-height: 200px; overflow-y: auto; font-size: 12px;">
          <div class="empty-state">No logs yet</div>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('cv');
      const ctx = canvas.getContext('2d');
      const connStatus = document.getElementById('conn-status');
      const connText = document.getElementById('conn-text');
      const runStatus = document.getElementById('run-status');
      const runText = document.getElementById('run-text');
      const humanCount = document.getElementById('human-count');
      const fpsValue = document.getElementById('fps-value');
      const fpsDisplay = document.getElementById('fps-display');
      const startBtn = document.getElementById('start-btn');
      const stopBtn = document.getElementById('stop-btn');
      const errorDisplay = document.getElementById('error-display');
      const personsList = document.getElementById('persons-list');
      const logsList = document.getElementById('logs-list');
      
      let ws = null;
      let isRunning = false;
      let lastFrameTime = Date.now();
      let frameCount = 0;
      let fpsInterval = null;
      let lastLogTime = 0;
      let lastDetectionCount = 0;
      let stableDetectionCount = 0;
      let stableCountFrames = 0;
      let pendingFrame = null;
      let isRendering = false;
      
      const piIpAddress = localStorage.getItem('piIpAddress') || window.location.hostname || 'localhost';
      const serverUrl = piIpAddress === 'localhost' || piIpAddress === window.location.hostname
        ? '' 
        : `http://${piIpAddress}:8000`;
      
      console.log('Connecting to server:', piIpAddress);

      function showError(message) {
        errorDisplay.textContent = message;
        errorDisplay.classList.add('show');
        console.error('Error:', message);
      }
      
      function hideError() {
        errorDisplay.classList.remove('show');
      }
      
      async function logDetection(count, persons) {
        try {
          await fetch(`${serverUrl}/log_detection`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              count: count,
              persons: persons.map(p => ({ confidence: p.bbox_conf }))
            })
          });
          await loadLogs();
        } catch (e) {
          console.error('Failed to log detection:', e);
        }
      }
      
      async function loadLogs() {
        try {
          const res = await fetch(`${serverUrl}/logs?limit=10`);
          const data = await res.json();
          if (data.logs && data.logs.length > 0) {
            let logsHTML = '';
            data.logs.forEach(log => {
              const date = new Date(log.timestamp);
              const timeStr = date.toLocaleTimeString();
              const dateStr = date.toLocaleDateString();
              logsHTML += `
                <div class="log-item">
                  <div class="log-time">${timeStr}</div>
                  <div class="log-detail">${dateStr} - ${log.count} human${log.count !== 1 ? 's' : ''} detected</div>
                </div>
              `;
            });
            logsList.innerHTML = logsHTML;
          }
        } catch (e) {
          console.error('Failed to load logs:', e);
        }
      }

      const skeleton = [
        [0,1],[0,2],[1,3],[2,4],         
        [0,5],[0,6],[5,6],                
        [5,7],[7,9],[6,8],[8,10],  
        [5,11],[6,12],[11,12],           
        [11,13],[13,15],[12,14],[14,16]   
      ];

      function resizeCanvas() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
      }
      
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function drawFrame(data) {
        pendingFrame = data;
        
        if (!isRendering) {
          isRendering = true;
          requestAnimationFrame(renderFrame);
        }
      }
      
      function renderFrame() {
        if (!pendingFrame) {
          isRendering = false;
          return;
        }
        
        const data = pendingFrame;
        pendingFrame = null;
        
        if (data.frame) {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width - img.width * scale) / 2;
            const y = (canvas.height - img.height * scale) / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(img, canvas.width - x - img.width * scale, y, img.width * scale, img.height * scale);
            ctx.restore();
            
            if (data.persons && data.persons.length > 0) {
              ctx.save();
              ctx.translate(x, y);
              ctx.scale(scale, scale);
              
              for (const person of data.persons) {
                const kps = person.keypoints;
                
                if (person.bbox) {
                  const [x1, y1, x2, y2] = person.bbox;
                  const conf = person.bbox_conf || 1.0;
                  const flippedX1 = img.width - x2;
                  const flippedX2 = img.width - x1;
                  ctx.strokeStyle = `rgba(0, 255, 136, ${conf})`;
                  ctx.lineWidth = 3 / scale;
                  ctx.strokeRect(flippedX1, y1, flippedX2 - flippedX1, y2 - y1);
                  
                  ctx.fillStyle = `rgba(0, 255, 136, ${conf})`;
                  ctx.font = `${16 / scale}px Arial`;
                  ctx.fillText(`Person ${(conf * 100).toFixed(0)}%`, flippedX1, y1 - 5 / scale);
                }
                
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.8)';
                ctx.lineWidth = 3 / scale;
                ctx.beginPath();
                for (const [a, b] of skeleton) {
                  if (kps[a] && kps[b] && 
                      kps[a][2] > 0.3 && kps[b][2] > 0.3 &&
                      kps[a][0] > 1 && kps[a][1] > 1 &&
                      kps[b][0] > 1 && kps[b][1] > 1) {
                    ctx.moveTo(img.width - kps[a][0], kps[a][1]);
                    ctx.lineTo(img.width - kps[b][0], kps[b][1]);
                  }
                }
                ctx.stroke();
                
                for (const kp of kps) {
                  if (kp[2] > 0.3 && kp[0] > 1 && kp[1] > 1) {
                    ctx.fillStyle = `rgba(255, 200, 0, ${Math.min(kp[2] * 1.5, 1.0)})`;
                    ctx.beginPath();
                    ctx.arc(img.width - kp[0], kp[1], 6 / scale, 0, Math.PI * 2);
                    ctx.fill();
                  }
                }
              }
              
              ctx.restore();
            }
            
            frameCount++;
            isRendering = false;
            
            if (pendingFrame) {
              requestAnimationFrame(renderFrame);
            }
          };
          img.src = 'data:image/jpeg;base64,' + data.frame;
        } else {
          isRendering = false;
        }
        
        if (data.persons) {
          humanCount.textContent = data.persons.length;
          
          const now = Date.now();
          const currentCount = data.persons.length;
          
          if (currentCount === stableDetectionCount) {
            stableCountFrames++;
          } else {
            stableDetectionCount = currentCount;
            stableCountFrames = 1;
          }
          

          let shouldLog = false;
          
          if (currentCount > 0) {
            if (stableCountFrames >= 3) {
              if (lastDetectionCount === 0) {
                shouldLog = true;
              }
            }
            
            if (stableCountFrames >= 5) {
              if (Math.abs(currentCount - lastDetectionCount) > 1) {
                shouldLog = true;
              }
            }
            
            if (now - lastLogTime > 30000) {
              shouldLog = true;
            }
          }
          
          if (shouldLog) {
            lastLogTime = now;
            lastDetectionCount = currentCount;
            logDetection(currentCount, data.persons);
          } else if (currentCount === 0 && lastDetectionCount > 0) {
            lastDetectionCount = 0;
          }
          
          if (data.persons.length > 0) {
            let listHTML = '';
            data.persons.forEach((person, idx) => {
              const conf = person.bbox_conf || 0;
              listHTML += `
                <div class="person-item">
                  <span class="person-id">Person ${idx + 1}</span>
                  <span class="person-conf">${(conf * 100).toFixed(1)}%</span>
                </div>
              `;
            });
            personsList.innerHTML = listHTML;
          } else {
            personsList.innerHTML = '<div class="empty-state">No detections</div>';
          }
        }
      }

      function updateFPS() {
        const fps = frameCount;
        fpsValue.textContent = fps;
        fpsDisplay.textContent = `FPS: ${fps}`;
        frameCount = 0;
      }

      function connect() {
        const wsHost = piIpAddress;
        const wsPort = '8000';
        const ws = new WebSocket(`ws://${wsHost}:${wsPort}/ws`);
        console.log('WebSocket connecting to:', `ws://${wsHost}:${wsPort}/ws`); 
        
        ws.onopen = () => {
          connStatus.classList.add('connected');
          connText.textContent = 'Connected';
          fpsInterval = setInterval(updateFPS, 1000);
          loadLogs();
        };
        
        ws.onclose = () => {
          connStatus.classList.remove('connected');
          connText.textContent = 'Disconnected';
          if (fpsInterval) clearInterval(fpsInterval);
          setTimeout(connect, 2000);
        };
        
        ws.onerror = () => {
          ws.close();
        };
        
        ws.onmessage = (ev) => {
          try {
            const data = JSON.parse(ev.data);
            if (data.error) {
              showError(data.error);
            } else if (data.idle) {
              hideError();
            } else {
              hideError();
              drawFrame(data);
            }
          } catch (e) {
            console.error('Parse error:', e);
            showError('Failed to parse server data');
          }
        };
      }

      async function startDetection() {
        try {
          const res = await fetch(`${serverUrl}/start`, { method: 'POST' });
          const data = await res.json();
          if (data.is_running) {
            isRunning = true;
            runStatus.classList.add('running');
            runStatus.classList.remove('stopped');
            runText.textContent = 'Running';
            startBtn.disabled = true;
            stopBtn.disabled = false;
          }
        } catch (e) {
          console.error('Start failed:', e);
        }
      }

      async function stopDetection() {
        try {
          const res = await fetch(`${serverUrl}/stop`, { method: 'POST' });
          const data = await res.json();
          if (!data.is_running) {
            isRunning = false;
            runStatus.classList.remove('running');
            runStatus.classList.add('stopped');
            runText.textContent = 'Stopped';
            startBtn.disabled = false;
            stopBtn.disabled = true;
            humanCount.textContent = '0';
            personsList.innerHTML = '<div class="empty-state">No detections</div>';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        } catch (e) {
          console.error('Stop failed:', e);
        }
      }

      connect();
    </script>
  </body>
</html>
