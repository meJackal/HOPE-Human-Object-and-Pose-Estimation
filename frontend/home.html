<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YOLOv8-Pose Detection System - Home</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
        color: #fff;
        padding: 40px 20px;
        position: relative;
        overflow-x: hidden;
      }
      
      body::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: backgroundMove 60s linear infinite;
        pointer-events: none;
      }
      
      @keyframes backgroundMove {
        0% { transform: translate(0, 0); }
        100% { transform: translate(50px, 50px); }
      }
      
      .container {
        max-width: 900px;
        text-align: center;
        animation: fadeIn 0.8s ease-in;
        position: relative;
        z-index: 1;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      h1 {
        font-size: 56px;
        font-weight: 900;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1px;
        text-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        animation: titleGlow 3s ease-in-out infinite;
      }
      
      @keyframes titleGlow {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.2); }
      }
      
      .subtitle {
        font-size: 20px;
        color: #aaa;
        margin-bottom: 50px;
        line-height: 1.6;
        font-weight: 400;
      }
      
      .status-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 16px;
        padding: 35px;
        margin-bottom: 35px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
      }
      
      .status-card:hover {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: 0 12px 48px rgba(0, 212, 255, 0.15);
      }
      
      .status-card h2 {
        margin-bottom: 25px;
        color: #00d4ff;
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      .input-wrapper {
        margin-bottom: 25px;
      }
      
      .input-wrapper label {
        display: block;
        margin-bottom: 10px;
        color: #aaa;
        font-size: 14px;
        font-weight: 600;
        text-align: left;
      }
      
      .input-wrapper input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 8px;
        border: 2px solid rgba(0, 212, 255, 0.2);
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        font-size: 16px;
        font-family: inherit;
        transition: all 0.3s ease;
      }
      
      .input-wrapper input:focus {
        outline: none;
        border-color: #00d4ff;
        background: rgba(0, 0, 0, 0.6);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
      }
      
      .input-wrapper input::placeholder {
        color: #666;
      }
      
      .input-tip {
        font-size: 12px;
        color: #888;
        margin-top: 10px;
        text-align: left;
        padding: 8px 12px;
        background: rgba(0, 212, 255, 0.05);
        border-left: 3px solid #00d4ff;
        border-radius: 4px;
      }
      
      .input-tip strong {
        color: #00d4ff;
      }
      
      .connect-button {
        width: 100%;
        margin-top: 12px;
        padding: 14px;
        background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      
      .connect-button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
      
      .connect-button:hover::before {
        width: 300px;
        height: 300px;
      }
      
      .connect-button:hover {
        box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        transform: translateY(-2px);
      }
      
      .connect-button:active {
        transform: translateY(0);
      }
      
      .status-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 16px 20px;
        margin: 12px 0;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        transition: all 0.3s ease;
      }
      
      .status-item:hover {
        background: rgba(0, 0, 0, 0.4);
        border-color: rgba(0, 212, 255, 0.2);
      }
      
      .status-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #444;
        position: relative;
        transition: all 0.3s ease;
      }
      
      .status-dot::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 24px;
        height: 24px;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      .status-dot.active { 
        background: #00ff88;
        box-shadow: 0 0 16px rgba(0, 255, 136, 0.6);
      }
      
      .status-dot.active::after {
        background: radial-gradient(circle, rgba(0, 255, 136, 0.4) 0%, transparent 70%);
        opacity: 1;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
      }
      
      .status-text {
        font-size: 16px;
        color: #ccc;
        font-weight: 500;
      }
      
      .status-text.active {
        color: #00ff88;
        font-weight: 700;
      }
      
      .btn-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      button {
        padding: 18px 42px;
        border: none;
        border-radius: 10px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
      }
      
      button span {
        position: relative;
        z-index: 1;
      }
      
      .btn-primary {
        background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
        color: #fff;
        box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3);
      }
      
      .btn-primary::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }
      
      .btn-primary:hover::before {
        width: 300px;
        height: 300px;
      }
      
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
      }
      
      .btn-primary:active {
        transform: translateY(-1px);
      }
      
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      
      .btn-primary:disabled:hover {
        transform: none;
        box-shadow: none;
      }
      
      .btn-secondary {
        background: rgba(0, 0, 0, 0.3);
        color: #00d4ff;
        border: 2px solid #00d4ff;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      
      .btn-secondary::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #00d4ff;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s ease;
        z-index: 0;
      }
      
      .btn-secondary:hover::before {
        transform: scaleX(1);
      }
      
      .btn-secondary:hover {
        color: #000;
        border-color: #00d4ff;
        box-shadow: 0 6px 24px rgba(0, 212, 255, 0.4);
      }
      
      .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 50px;
      }
      
      .info-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
        backdrop-filter: blur(10px);
        padding: 28px 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
      }
      
      .info-card:hover {
        border-color: rgba(0, 212, 255, 0.3);
        transform: translateY(-5px);
        box-shadow: 0 12px 32px rgba(0, 212, 255, 0.15);
      }
      
      .info-icon {
        font-size: 40px;
        margin-bottom: 14px;
        filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.3));
      }
      
      .info-title {
        font-size: 16px;
        font-weight: 700;
        color: #00d4ff;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .info-desc {
        font-size: 14px;
        color: #aaa;
        line-height: 1.5;
      }
      
      .loader {
        border: 3px solid rgba(0, 255, 136, 0.2);
        border-top: 3px solid #00ff88;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: inline-block;
        margin-left: 10px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>YOLOv8 Pose Detection System</h1>
      <p class="subtitle">
        Real-time human pose detection and tracking powered by advanced AI
      </p>
      
      <div class="status-card">
        <h2>Raspberry Pi Connection</h2>
        
        <div class="input-wrapper">
          <label>
            Raspberry Pi Address:
          </label>
          <input 
            type="text" 
            id="pi-ip" 
            placeholder="raspberrypi.local or 192.168.1.100" 
            value="raspberrypi.local"
          />
          <p class="input-tip">
            💡 Tip: Use <strong>raspberrypi.local</strong> (hostname) so IP changes don't matter!
          </p>
          <button class="connect-button" onclick="connectToPi()">
            <span>Connect to Raspberry Pi</span>
          </button>
        </div>
        
        <div class="status-item">
          <div class="status-dot" id="server-status"></div>
          <span class="status-text" id="server-text">Not connected</span>
          <div class="loader" id="server-loader" style="display: none;"></div>
        </div>
        <div class="status-item">
          <div class="status-dot" id="model-status"></div>
          <span class="status-text" id="model-text">Waiting for connection...</span>
        </div>
        <div class="status-item">
          <div class="status-dot" id="camera-status"></div>
          <span class="status-text" id="camera-text">Waiting for connection...</span>
        </div>
      </div>
      
      <div class="btn-container">
        <button class="btn-primary" id="start-btn" onclick="goToDetection()" disabled>
          <span>Start Detection System</span>
        </button>
        <button class="btn-secondary" onclick="checkStatus()">
          <span>Refresh Status</span>
        </button>
      </div>

    <script>
      let systemReady = false;
      let piIpAddress = 'localhost';

      // Load saved IP address from localStorage
      window.onload = function() {
        const savedIp = localStorage.getItem('piIpAddress');
        if (savedIp) {
          document.getElementById('pi-ip').value = savedIp;
          piIpAddress = savedIp;
        } else {
          // Default to raspberrypi.local
          document.getElementById('pi-ip').value = 'raspberrypi.local';
        }
        
        // Auto-check if IP is set and not localhost
        if (savedIp && savedIp !== 'localhost') {
          connectToPi();
        }
      };

      async function connectToPi() {
        const ipInput = document.getElementById('pi-ip').value.trim();
        
        if (!ipInput) {
          alert('Please enter the Raspberry Pi IP address');
          return;
        }
        
        piIpAddress = ipInput;
        localStorage.setItem('piIpAddress', piIpAddress);
        
        // Reset status
        document.getElementById('server-status').classList.remove('active');
        document.getElementById('model-status').classList.remove('active');
        document.getElementById('camera-status').classList.remove('active');
        document.getElementById('server-text').textContent = 'Connecting...';
        document.getElementById('server-text').classList.remove('active');
        document.getElementById('model-text').textContent = 'Waiting...';
        document.getElementById('model-text').classList.remove('active');
        document.getElementById('camera-text').textContent = 'Waiting...';
        document.getElementById('camera-text').classList.remove('active');
        document.getElementById('server-loader').style.display = 'inline-block';
        document.getElementById('start-btn').disabled = true;
        
        await checkStatus();
      }

      async function checkStatus() {
        try {
          const serverUrl = piIpAddress === 'localhost' 
            ? 'http://localhost:8000' 
            : `http://${piIpAddress}:8000`;
          
          const response = await fetch(`${serverUrl}/status`);
          const data = await response.json();
          
          // Update server status
          const serverStatus = document.getElementById('server-status');
          const serverText = document.getElementById('server-text');
          serverStatus.classList.add('active');
          serverText.classList.add('active');
          serverText.textContent = `Connected to ${piIpAddress} ✓`;
          
          // Update model status
          const modelStatus = document.getElementById('model-status');
          const modelText = document.getElementById('model-text');
          if (data.model_loaded) {
            modelStatus.classList.add('active');
            modelText.classList.add('active');
            modelText.textContent = 'Model Loaded ✓';
          } else {
            modelStatus.classList.remove('active');
            modelText.classList.remove('active');
            modelText.textContent = 'Model Not Loaded';
          }
          
          // Update camera status
          const cameraStatus = document.getElementById('camera-status');
          const cameraText = document.getElementById('camera-text');
          if (data.camera_open) {
            cameraStatus.classList.add('active');
            cameraText.classList.add('active');
            cameraText.textContent = 'Camera Ready ✓';
          } else {
            cameraStatus.classList.remove('active');
            cameraText.classList.remove('active');
            cameraText.textContent = 'Camera Not Ready';
          }
          
          // Enable start button if system is ready
          systemReady = data.status === 'ok';
          document.getElementById('start-btn').disabled = !systemReady;
          
          document.getElementById('server-loader').style.display = 'none';
          
        } catch (error) {
          console.error('Failed to check status:', error);
          
          const serverStatus = document.getElementById('server-status');
          const serverText = document.getElementById('server-text');
          serverStatus.classList.remove('active');
          serverText.classList.remove('active');
          serverText.textContent = `Cannot connect to ${piIpAddress} ✗`;
          
          document.getElementById('model-status').classList.remove('active');
          document.getElementById('model-text').textContent = 'Unknown';
          document.getElementById('model-text').classList.remove('active');
          
          document.getElementById('camera-status').classList.remove('active');
          document.getElementById('camera-text').textContent = 'Unknown';
          document.getElementById('camera-text').classList.remove('active');
          
          document.getElementById('server-loader').style.display = 'none';
          document.getElementById('start-btn').disabled = true;
        }
      }

      function goToDetection() {
        if (systemReady) {
          // Store the IP for the detection page
          localStorage.setItem('piIpAddress', piIpAddress);
          
          const detectionUrl = piIpAddress === 'localhost' 
            ? '/detection' 
            : `http://${piIpAddress}:8000/detection`;
            
          window.location.href = detectionUrl;
        }
      }
    </script>
  </body>
</html>
